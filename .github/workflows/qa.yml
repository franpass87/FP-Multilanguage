name: QA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  quality:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wordpress }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
        wordpress: ['6.4', '6.5']
    env:
      WORDPRESS_VERSION: ${{ matrix.wordpress }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPCS
        run: composer lint

      - name: Run PHPStan
        run: composer stan

      - name: Run PHPUnit
        run: composer test
